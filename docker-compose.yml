# Local Postgres for the Aldi Weekly Grocery Planner — used for development and for the
# integration/E2E test suites (TEST_DATABASE_URL / E2E_DATABASE_URL). The live data lives in
# the cloud database configured in .env. Bound to 127.0.0.1 only; never expose this port.
services:
  db:
    image: postgres:17-alpine
    container_name: meal_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
      POSTGRES_DB: meal_planner
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - meal_planner_pgdata:/var/lib/postgresql/data

volumes:
  meal_planner_pgdata:
